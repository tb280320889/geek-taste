tasks:
  build:
    command: 'cargo build'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
    toolchain: 'rust'

  test:
    command: 'cargo test'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
    toolchain: 'rust'

  check:
    command: 'cargo check'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
    toolchain: 'rust'

  lint:
    command: 'cargo clippy -- -D warnings'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
    toolchain: 'rust'

  format:
    command: 'cargo fmt --all'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
    toolchain: 'rust'
