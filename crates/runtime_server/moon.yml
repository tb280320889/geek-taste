language: 'rust'

tasks:
  build:
    command: 'cargo build -p runtime_server'
    toolchain: 'rust'
  test:
    command: 'cargo test -p runtime_server'
    toolchain: 'rust'
  check:
    command: 'cargo check -p runtime_server'
    toolchain: 'rust'
  lint:
    command: 'cargo clippy -p runtime_server -- -D warnings'
    toolchain: 'rust'
  format:
    command: 'cargo fmt'
    toolchain: 'rust'
