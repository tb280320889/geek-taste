language: 'javascript'

tasks:
  dev:
    command: 'vite dev'
    preset: 'server'

  build:
    command: 'vite build'
    inputs:
      - 'src/**/*'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'package.json'

  check:
    script: 'svelte-kit sync && svelte-check --tsconfig ./tsconfig.json'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  test:
    script: 'svelte-kit sync && svelte-check --tsconfig ./tsconfig.json'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  lint:
    command: 'biome lint .'
    inputs:
      - 'src/**/*'

  format:
    command: 'biome format --write .'
    inputs:
      - 'src/**/*'

  # Tauri 相关
  tauri-build:
    command: 'cargo build'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
    inputs:
      - 'src-tauri/**/*'
      - 'src-tauri/Cargo.toml'
    toolchain: 'rust'
